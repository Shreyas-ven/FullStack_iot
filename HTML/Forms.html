<!DOCTYPE html>
<html>

<head>
    <title>
        <title>Forms</title>
    </title>
</head>
<body>
    <form>
        <h1></h1>
        <label>Name</label>
        <input type="text">
        <br><br>

        <label>Email</label>
        <input type="email">
        <br><br>

        <label>Password</label>
        <input type="password">
        <br><br>

        <label>Gender</label>
        <br>
        <input type="radio" name="gender">Male
        <input type="radio" name="gender">Female

        <br><br>
        <label>Course</label>
        <br>
        <input type="checkbox" name="course">OOP's
        <input type="checkbox" name="course">DBMS
        <input type="checkbox" name="course">HTML

        <br><br>
        <label>Hobbies</label>
        <select>
            <option>Dancing</option>
            <option>Playing</option>
        </select>

        <br>
        <br>
        <input type="submit">

    </form>
      
</body>

</html>
